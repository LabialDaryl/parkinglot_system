{% extends 'base.html' %}

{% block title %}Admin Login - ParkSmart{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="glass-panel p-4 p-md-5 mt-5">
            <div class="text-center mb-4 pb-4 border-bottom border-secondary border-opacity-25">
                <div class="fs-1 mb-2">🔐</div>
                <h3 class="fw-bold mb-0">Admin Access</h3>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="password" class="form-label text-muted small">Admin Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary rounded-pill shadow">Sign In</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
